<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="styles.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThumbnailChecker — See Your Thumbnail Everywhere</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<button id="backBtn">← Back</button>

<div class="main-title">Your Thumbnail on <span>Every Platform</span></div>
<div class="subtitle">Scroll down to see how your content appears everywhere YouTube lives</div>

<div class="preview-grid">

  <!-- DESKTOP HOME -->
  <div class="preview-card">
    <div class="card-header">
      <span class="platform-badge">DESKTOP</span>
      <span>YouTube Home</span>
    </div>

    <div class="yt-desktop-home">
      <div class="yt-dh-grid">

        <div class="yt-dh-item active">
          <div class="yt-thumb-wrap">
            <img id="dh-thumb">
            <span class="yt-duration">12:34</span>
          </div>

          <div class="yt-dh-meta">
            <div class="yt-avatar"></div>
            <div>
              <div class="yt-dh-title" id="dh-title"></div>
              <div class="yt-dh-channel">Your Channel</div>
            </div>
          </div>
        </div>

        <div class="yt-dh-item"><div class="yt-thumb-wrap"></div></div>
        <div class="yt-dh-item"><div class="yt-thumb-wrap"></div></div>

      </div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="preview-card">
    <div class="card-header">
      <span class="platform-badge">DESKTOP</span>
      <span>Search Results</span>
    </div>

    <div class="yt-search-bg">

      <div class="yt-search-bar">
        <span id="search-query-display">your video title...</span>
        🔍
      </div>

      <div class="yt-search-result">
        <div class="yt-sr-thumb">
          <img id="sr-thumb">
          <span class="yt-duration">12:34</span>
        </div>

        <div class="yt-sr-info">
          <div class="yt-sr-title" id="sr-title"></div>
          <div class="yt-sr-meta">Your Channel • 1.2K views</div>
        </div>
      </div>

      <div class="yt-search-result">
        <div class="yt-sr-thumb"></div>
        <div class="yt-sr-info"></div>
      </div>

    </div>
  </div>

</div>

  <!-- Search -->
  <div class="preview-card">
    <div class="card-header">
      <span class="platform-badge">DESKTOP</span>
      <span>Search Results</span>
    </div>

    <div class="yt-sim">
      <div class="yt-thumb">
        <img src="">
      </div>

      <div class="yt-search-title">Video title</div>
    </div>
  </div>

</div>
<script>
document.addEventListener('DOMContentLoaded', () => {

  const thumb = sessionStorage.getItem('thumbDataURL');
  const title = sessionStorage.getItem('videoTitle') || 'Your Video Title';

  console.log("Thumbnail:", thumb); // debug

  // Apply thumbnail
  if (thumb) {
  document.getElementById('dh-thumb').src = thumb;
  document.getElementById('sr-thumb').src = thumb;
}

document.getElementById('dh-title').textContent = title;
document.getElementById('sr-title').textContent = title;
document.getElementById('search-query-display').textContent = title;

  // Apply title
  document.querySelectorAll('.yt-feed-title, .yt-search-title').forEach(el => {
    el.textContent = title;
  });

});
</script>
<script>
  const backBtn = document.getElementById('backBtn');
  const previewGrid = document.querySelector('.preview-grid');
  const mainTitle = document.querySelector('.main-title');
  const subtitle = document.querySelector('.subtitle');

  function showPreview() {
    previewGrid.style.display = '';
    mainTitle.style.display = '';
    subtitle.style.display = '';
    backBtn.style.display = 'inline-flex';
  }

  function showUpload() {
    previewGrid.style.display = 'none';
    mainTitle.style.display = 'none';
    subtitle.style.display = 'none';
    backBtn.style.display = 'none';
  }

  showPreview();

  // ✅ THIS is the fix
  backBtn.onclick = () => {
    window.location.href = "index.html";
  };
</script>
</body>
</html>
