<link rel="stylesheet" href="styles.css">

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThumbnailChecker — See Your Thumbnail Everywhere</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: radial-gradient(circle at 80% 80%, #ffe7d6 0%, #fff8f4 60%, #fff7f0 100%);
      font-family: 'Nunito', 'Roboto', Arial, sans-serif;
      margin: 0;
      color: #1a1a2e;
    }

    .main-title {
      text-align: center;
      font-size: 2.6rem;
      font-weight: 900;
      margin-top: 40px;
    }

    .main-title span {
      color: #ff5c5c;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 36px;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 36px;
      max-width: 1300px;
      margin: 0 auto 36px auto;
    }

    .preview-card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 22px 28px;
      border-bottom: 1px solid #eee;
    }

    .platform-badge {
      background: #ff5c5c;
      color: #fff;
      border-radius: 16px;
      padding: 6px 18px;
      font-weight: 900;
    }

    .yt-sim {
      background: #181818;
      padding: 20px;
    }

    .yt-thumb img {
      width: 100%;
      border-radius: 10px;
    }

    .yt-feed-title, .yt-search-title {
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

<button id="backBtn">← Back</button>

<div class="main-title">Your Thumbnail on <span>Every Platform</span></div>
<div class="subtitle">Scroll down to see how your content appears everywhere YouTube lives</div>

<div class="preview-grid">
    <!-- Desktop Home -->
  <div class="preview-card">
    <div class="card-header">
      <span class="platform-badge">DESKTOP</span>
      <span>YouTube Home</span>
    </div>

    <div class="yt-sim">
      <div class="yt-thumb">
        <img src="">
      </div>

      <div class="yt-feed-title">Video title</div>
    </div>
  </div>

  <!-- Search -->
  <div class="preview-card">
    <div class="card-header">
      <span class="platform-badge">DESKTOP</span>
      <span>Search Results</span>
    </div>

    <div class="yt-sim">
      <div class="yt-thumb">
        <img src="">
      </div>

      <div class="yt-search-title">Video title</div>
    </div>
  </div>

</div>
<script>
document.addEventListener('DOMContentLoaded', () => {

  const thumb = sessionStorage.getItem('thumbDataURL');
  const title = sessionStorage.getItem('videoTitle') || 'Your Video Title';

  console.log("Thumbnail:", thumb); // debug

  // Apply thumbnail
  document.querySelectorAll('img').forEach(img => {
    if (thumb) {
      img.src = thumb;
    }
  });

  // Apply title
  document.querySelectorAll('.yt-feed-title, .yt-search-title').forEach(el => {
    el.textContent = title;
  });

});
</script>
<script>
  const backBtn = document.getElementById('backBtn');
  const previewGrid = document.querySelector('.preview-grid');
  const mainTitle = document.querySelector('.main-title');
  const subtitle = document.querySelector('.subtitle');

  function showPreview() {
    previewGrid.style.display = '';
    mainTitle.style.display = '';
    subtitle.style.display = '';
    backBtn.style.display = 'inline-flex';
  }

  function showUpload() {
    previewGrid.style.display = 'none';
    mainTitle.style.display = 'none';
    subtitle.style.display = 'none';
    backBtn.style.display = 'none';
  }

  showPreview();

  // ✅ THIS is the fix
  backBtn.onclick = () => {
    window.location.href = "index.html";
  };
</script>
</body>
</html>
